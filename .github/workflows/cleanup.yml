name: Auto-cleanup expired ticket pages
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete expired ticket HTML files
        run: |
          EXPIRE_HOURS=24
          NOW=$(date +%s)
          DELETED=0
          TICKET_RE='^[A-Z0-9]{20}\.html$'
          for f in *.html; do
            [ -f "$f" ] || continue
            if [[ ! "$f" =~ $TICKET_RE ]] && [ "$f" != "_tickets.html" ]; then
              continue
            fi
            CREATED=$(grep -oP 'name="created-at" content="\K[^"]+' "$f" 2>/dev/null || echo "")
            [ -z "$CREATED" ] && continue
            CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo "0")
            [ "$CREATED_TS" = "0" ] && continue
            AGE_HOURS=$(( (NOW - CREATED_TS) / 3600 ))
            if [ "$AGE_HOURS" -ge "$EXPIRE_HOURS" ]; then
              echo "Deleting $f (${AGE_HOURS}h old)"
              rm -f "$f"
              DELETED=$((DELETED + 1))
            fi
          done
          echo "Deleted $DELETED expired files"
          if [ "$DELETED" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Auto-cleanup: deleted $DELETED expired ticket pages"
            git push
          fi
