const BIDs=[...new Set(DATA.map(d=>d.b))];
const IPs=[...new Set(DATA.map(d=>d.ip))];
let qty={},fB="all",fI="all",fT="all";
function sv(){try{localStorage.setItem(SK,JSON.stringify(qty))}catch(e){}}
function ld(){try{const s=localStorage.getItem(SK);if(s)qty=JSON.parse(s)}catch(e){}}
function cl(){try{localStorage.removeItem(SK)}catch(e){}}
function toast(m,ms=1200){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),ms)}

function renderFilters(){
  const bt=document.getElementById("boothTabs");
  bt.innerHTML=`<button class="ftab bt active" data-b="all">全部厂商</button>`;
  BOOTHS.forEach(b=>{bt.innerHTML+=`<button class="ftab bt" data-b="${b.id}">${b.name}</button>`});
  bt.querySelectorAll(".ftab").forEach(el=>el.addEventListener("click",()=>{fB=el.dataset.b;bt.querySelectorAll(".ftab").forEach(x=>x.classList.toggle("active",x===el));updIP();af()}));
  updIP();
  document.querySelectorAll("#typeTabs .ftab").forEach(el=>el.addEventListener("click",()=>{fT=el.dataset.type;document.querySelectorAll("#typeTabs .ftab").forEach(x=>x.classList.toggle("active",x===el));af()}));
}
function updIP(){
  const it=document.getElementById("ipTabs");
  const vis=fB==="all"?IPs:[...new Set(DATA.filter(d=>d.b===fB).map(d=>d.ip))];
  it.innerHTML=`<button class="ftab active" data-ip="all">全部IP</button>`;
  vis.forEach(ip=>{it.innerHTML+=`<button class="ftab" data-ip="${ip}">${ip}</button>`});
  fI="all";
  it.querySelectorAll(".ftab").forEach(el=>el.addEventListener("click",()=>{fI=el.dataset.ip;it.querySelectorAll(".ftab").forEach(x=>x.classList.toggle("active",x===el));af()}));
}
function af(){
  document.querySelectorAll(".gc").forEach(c=>{const bO=fB==="all"||c.dataset.b===fB;const iO=fI==="all"||c.dataset.ip===fI;const tO=fT==="all"||c.dataset.cat===fT;c.classList.toggle("hidden",!(bO&&iO&&tO))});
  document.querySelectorAll(".booth-sec").forEach(s=>{const bO=fB==="all"||s.dataset.b===fB;const hv=s.querySelectorAll(".gc:not(.hidden)").length>0;s.classList.toggle("hidden",!bO||!hv)});
  document.querySelectorAll(".ip-sec").forEach(s=>{s.classList.toggle("hidden",s.querySelectorAll(".gc:not(.hidden)").length===0)});
}

function renderGoods(){
  const L=document.getElementById("goodsList");L.innerHTML="";
  let cB=null,cI=null,bS=null,iS=null;
  DATA.forEach(d=>{
    if(d.b!==cB){cB=d.b;cI=null;const b=BOOTHS.find(x=>x.id===d.b);bS=document.createElement("div");bS.className="booth-sec";bS.dataset.b=d.b;
      bS.innerHTML=`<div class="booth-hdr">${b.name}</div><div class="booth-rule">${b.rule}</div>${b.bonuses.map(x=>`<div class="booth-bonus">${x.t}</div>`).join("")}<div class="booth-after">${b.after||""}</div>`;
      L.appendChild(bS)}
    if(d.ip!==cI){cI=d.ip;iS=document.createElement("div");iS.className="ip-sec";iS.dataset.ip=d.ip;iS.dataset.b=d.b;iS.innerHTML=`<div class="ip-hdr">${d.ip}</div>`;bS.appendChild(iS)}
    const q=qty[d.id]||0;
    const vt=d.venue==="online"?`<span class="gc-tag venue">通販限定</span>`:d.venue==="venue"?`<span class="gc-tag venue">会場限定</span>`:"";
    const gt=d.group?`<span class="gc-tag trad">单/BOX共享限购</span>`:"";
    const c=document.createElement("div");c.className="gc";c.dataset.id=d.id;c.dataset.b=d.b;c.dataset.ip=d.ip;c.dataset.cat=d.cat;
    c.innerHTML=`<div class="gc-img"><img src="${imgSrc(d.img)}" data-rel="${d.img}" data-cdn-idx="0" alt="${d.zh}" loading="lazy" onerror="imgFallback(this)"/></div><div class="gc-body"><div class="gc-zh">${d.zh}</div><div class="gc-ja">${d.ja}</div>${d.note?`<div class="gc-meta">${d.note}</div>`:""}<div class="gc-tags"><span class="gc-tag lim">限购:${d.limit}</span>${vt}${gt}</div><div class="gc-price">¥${yen(d.price)}</div><div class="gc-row"><div class="gc-qw"><button type="button" data-d="-1">−</button><input type="number" min="0" value="${q}" inputmode="numeric" data-id="${d.id}"/><button type="button" data-d="1">＋</button></div><div class="gc-sub" data-sub="${d.id}">¥${yen(q*d.price)}</div></div><div class="gc-info" data-info="${d.id}"></div></div>`;
    c.querySelector(".gc-img").addEventListener("click",()=>{const i=document.getElementById("lbImg");i.src=imgSrc(d.img);i.dataset.rel=d.img;i.dataset.cdnIdx="0";i.onerror=function(){imgFallback(this)};document.getElementById("lb").classList.add("open")});
    const inp=c.querySelector("input");
    c.querySelectorAll(".gc-qw button").forEach(b=>b.addEventListener("click",()=>{let v=parseInt(inp.value||"0",10);if(isNaN(v))v=0;v+=parseInt(b.dataset.d);if(v<0)v=0;inp.value=v;qty[d.id]=v;recalc()}));
    inp.addEventListener("input",()=>{let v=parseInt(inp.value||"0",10);if(isNaN(v)||v<0)v=0;qty[d.id]=v;recalc()});
    inp.addEventListener("change",()=>{let v=parseInt(inp.value||"0",10);if(isNaN(v)||v<0)v=0;inp.value=v;qty[d.id]=v;recalc()});
    iS.appendChild(c);
  });
}

function recalc(){
  let total=0;
  DATA.forEach(d=>{const q=qty[d.id]||0;total+=q*d.price;const el=document.querySelector(`[data-sub="${d.id}"]`);if(el)el.textContent="¥"+yen(q*d.price)});
  document.getElementById("grandTotal").textContent=yen(total);
  // Queue per booth
  const bq={};BIDs.forEach(b=>{bq[b]=0});
  // Non-grouped
  DATA.filter(d=>!d.group).forEach(d=>{const q=qty[d.id]||0;if(q<=0)return;const r=Math.ceil(q/d.limitN);bq[d.b]=Math.max(bq[d.b],r);const el=document.querySelector(`[data-info="${d.id}"]`);if(el){if(r>1){el.textContent=`需${r}次排队`;el.classList.add("show")}else{el.textContent="";el.classList.remove("show")}}});
  // Grouped
  const gs={};
  DATA.filter(d=>d.group).forEach(d=>{const q=qty[d.id]||0;const k=d.b+"::"+d.group;if(!gs[k])gs[k]={b:d.b,bQ:0,sQ:0,bL:0,sL:0,ids:[]};const g=gs[k];g.ids.push(d.id);if(d.uq&&d.uq>1){g.bQ+=q;g.bL=d.limitN}else{g.sQ+=q;g.sL=d.limitN}});
  Object.values(gs).forEach(g=>{let r=0;if(g.bQ>0&&g.bL>0)r=Math.max(r,Math.ceil(g.bQ/g.bL));if(g.sQ>0&&g.sL>0)r=Math.max(r,Math.ceil(g.sQ/g.sL));bq[g.b]=Math.max(bq[g.b],r);g.ids.forEach(id=>{const el=document.querySelector(`[data-info="${id}"]`);if(el){if(r>1){el.textContent=`需${r}次排队`;el.classList.add("show")}else{el.textContent="";el.classList.remove("show")}}})});
  const qp=[];BOOTHS.forEach(b=>{if(bq[b.id]>0)qp.push(`${b.name}:${bq[b.id]}次`)});
  document.getElementById("queueInfo").textContent=qp.length?("排队 "+qp.join(" / ")):"";
}

document.getElementById("lbX").addEventListener("click",()=>document.getElementById("lb").classList.remove("open"));
// Copy
function cp(t){return new Promise(r=>{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(()=>r(true)).catch(()=>r(fc(t)));else r(fc(t))})}
function fc(t){const a=document.createElement("textarea");a.value=t;a.style.cssText="position:fixed;left:-9999px;top:0;opacity:0";document.body.appendChild(a);a.focus();a.select();let ok=false;try{ok=document.execCommand("copy")}catch(e){}document.body.removeChild(a);return ok}
// Buttons
document.getElementById("resetBtn").addEventListener("click",()=>{if(!confirm("确定清空？"))return;qty={};document.querySelectorAll(".gc-qw input").forEach(i=>i.value=0);cl();recalc();toast("已清空")});
document.getElementById("saveBtn").addEventListener("click",()=>{sv();toast("草稿已保存")});
// Modal
const modal=document.getElementById("modal");
function oM(){modal.classList.add("open")}function cM(){modal.classList.remove("open")}
document.getElementById("mBg").addEventListener("click",cM);document.getElementById("mCancel").addEventListener("click",cM);document.getElementById("mClose").addEventListener("click",cM);
function picked(){return DATA.map(d=>({d,q:qty[d.id]||0})).filter(x=>x.q>0)}
document.getElementById("submitBtn").addEventListener("click",()=>{if(!picked().length){toast("请先填写数量");return}document.getElementById("stepForm").style.display="";document.getElementById("stepOk").style.display="none";document.getElementById("mTitle").textContent="提交订单";document.getElementById("cInput").value="";document.getElementById("rInput").value="";document.getElementById("cErr").classList.remove("show");oM()});
document.getElementById("mConfirm").addEventListener("click",async()=>{const c=document.getElementById("cInput").value.trim();const err=document.getElementById("cErr");if(!c||c.length<2){err.textContent="请填写联系方式";err.classList.add("show");return}err.classList.remove("show");const btn=document.getElementById("mConfirm");btn.disabled=true;btn.textContent="提交中...";const oid="AJ26-"+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();await new Promise(r=>setTimeout(r,300));btn.disabled=false;btn.textContent="确认提交";document.getElementById("mTitle").textContent="提交成功";document.getElementById("stepForm").style.display="none";document.getElementById("stepOk").style.display="";document.getElementById("orderId").textContent=oid;bSum(oid,c);sv()});
function bSum(oid,contact){const p=picked();const tb=document.querySelector("#sumTbl tbody");tb.innerHTML="";let cB="";p.forEach(x=>{const bn=BOOTHS.find(b=>b.id===x.d.b)?.name||x.d.b;const tr=document.createElement("tr");tr.innerHTML=`<td>${bn!==cB?(cB=bn,bn):""}</td><td>${x.d.ip}</td><td><strong>${x.d.zh}</strong></td><td class="qb">${x.q}</td>`;tb.appendChild(tr)});const total=p.reduce((s,x)=>s+x.q*x.d.price,0);document.getElementById("sumMeta").textContent=`合计${p.reduce((s,x)=>s+x.q,0)}项 / ¥${yen(total)}`;
  document.getElementById("cpId").onclick=async()=>{const ok=await cp(oid);toast(ok?"已复制":"复制失败")};
  document.getElementById("cpList").onclick=async()=>{const lines=["AJ2026代购订单",`订单号：${oid}`,`联系：${contact}`,`总价：¥${yen(total)}`,""];let lb="",li="";p.forEach(x=>{const bn=BOOTHS.find(b=>b.id===x.d.b)?.name||x.d.b;if(bn!==lb){lines.push(`\n【${bn}】`);lb=bn;li=""}if(x.d.ip!==li){lines.push(`  [${x.d.ip}]`);li=x.d.ip}lines.push(`    ${x.d.zh} ×${x.q} ¥${yen(x.q*x.d.price)}`)});const ok=await cp(lines.join("\n"));toast(ok?"已复制":"复制失败")}}
