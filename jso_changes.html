<div id="bar">
  <span id="cnt">已选 0</span>
  <div class="acts">
    <button id="btnWatch" disabled class="secondary">⭐ 导出重点</button>
    <button id="btnExclude" disabled class="warn">🚫 导出排除</button>
    <button id="btnCopy" disabled class="icon-only secondary">📋</button>
    <button id="btnCart" disabled>⚡ 批量直通结算</button>
  </div>

<script>
const BASE="https://jumpshop-benelic.com";
const boxes=document.querySelectorAll('.sel');
const cntEl=document.getElementById('cnt');
const btnCart=document.getElementById('btnCart');
const btnCopy=document.getElementById('btnCopy');
const btnWatch=document.getElementById('btnWatch');
const btnExclude=document.getElementById('btnExclude');
const allCk=document.getElementById('allck');

function update(){
  const n=[...boxes].filter(b=>b.checked).length;
  cntEl.textContent='已选 '+n;
  btnCart.disabled=btnCopy.disabled=btnWatch.disabled=btnExclude.disabled=n===0;
  const enabled=[...boxes].filter(b=>!b.disabled);
  allCk.checked=enabled.length>0&&enabled.every(b=>b.checked);
}

// 阻止卡片内链接触发 label 选中
document.querySelectorAll('.card a').forEach(a=>{
  a.addEventListener('click',e=>e.stopPropagation());
});

allCk.addEventListener('change',function(){
  const v=this.checked;
  boxes.forEach(b=>{if(!b.disabled) b.checked=v;});
  update();
});

boxes.forEach(b=>b.addEventListener('change',update));

function buildUrl(){
  // 路径 permalink：/cart/V1:Q1,V2:Q2,...  此店默认直通 checkout
  const items=[...boxes].filter(b=>b.checked);
  const path=items.map(b=>b.dataset.vid+':'+b.dataset.qty).join(',');
  return BASE+'/cart/'+path;
}

btnCart.addEventListener('click',function(){
  window.open(buildUrl(),'_blank');
});

btnCopy.addEventListener('click',function(){
  const url=buildUrl();
  const done=()=>{this.textContent='✅';setTimeout(()=>this.textContent='📋',1500)};
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(done.bind(this)).catch(()=>{
      const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done.call(this);
    });
  }else{
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done.call(this);
  }
});

function exportList(type,label){
  const items=[...boxes].filter(b=>b.checked).map(b=>({
    handle: b.dataset.handle,
    name: b.dataset.name
  }));
  // 按 handle 去重
  const seen=new Set();
  const unique=items.filter(it=>{
    if(seen.has(it.handle)) return false;
    seen.add(it.handle);
    return true;
  });
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const ts=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes());
  const data={
    type: type,
    exported_at: now.toISOString(),
    count: unique.length,
    items: unique
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='jso_'+type+'_'+ts+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

btnWatch.addEventListener('click',function(){exportList('watch','重点')});
btnExclude.addEventListener('click',function(){exportList('exclude','排除')});
</script>
