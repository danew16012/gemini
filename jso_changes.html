<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>JSO 变化记录</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:#222}
.wrap{max-width:760px;margin:0 auto;padding:12px 12px 96px}
header h2{margin:0 0 2px;font-size:18px}
header p{margin:0 0 12px;color:#888;font-size:12px}

.list{display:flex;flex-direction:column;gap:8px}
.card{display:flex;gap:10px;background:#fff;border-radius:10px;padding:12px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;
  border:2px solid transparent;transition:border-color .15s,box-shadow .15s}
.card:has(.sel:checked){border-color:#1a73e8;box-shadow:0 2px 8px rgba(26,115,232,.18)}
.card.pri{background:#fffde7}
.card.sup{background:#f3f4f6;color:#9ca3af;cursor:default}
.card.sup .title,.card.sup .link{color:#9ca3af}

.ck{flex:0 0 auto;display:flex;align-items:flex-start;padding-top:2px}
.ck input[type=checkbox]{width:22px;height:22px;cursor:pointer;margin:0;accent-color:#1a73e8}
.ck input[type=checkbox]:disabled{cursor:default;opacity:.3}

.body{flex:1;min-width:0}
.title{font-size:15px;font-weight:600;line-height:1.4;word-break:break-word}
.card.pri .title{font-weight:700}
.icon{margin-right:4px}

.meta{margin-top:4px;font-size:13px;color:#666;line-height:1.5;word-break:break-word}
.badge{display:inline-block;background:#1a73e8;color:#fff;font-size:11px;font-weight:600;
  padding:1px 7px;border-radius:10px;margin-right:6px;vertical-align:1px}
.card.sup .badge{background:#9ca3af}

.foot{margin-top:8px;display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;
  font-size:12px;color:#888}
.foot .ts{color:#aaa}
.foot .link{color:#1a73e8;text-decoration:none;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px}
.foot .cart{margin-left:auto;color:#1a73e8;text-decoration:none;font-weight:600;font-size:12px;
  padding:4px 10px;border:1px solid #1a73e8;border-radius:6px}
.foot a:active{opacity:.6}

.empty{text-align:center;color:#999;padding:60px 0}

/* 浮动操作栏 */
#bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e5e7eb;
  padding:10px 14px;display:flex;align-items:center;gap:10px;z-index:10;
  box-shadow:0 -2px 10px rgba(0,0,0,.08);
  padding-bottom:calc(10px + env(safe-area-inset-bottom))}
#cnt{font-size:14px;font-weight:600;flex:0 0 auto}
#ckpri-wrap{font-size:12px;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
#ckpri{width:16px;height:16px;accent-color:#1a73e8}
.acts{margin-left:auto;display:flex;gap:8px}
#bar button{background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:9px 16px;
  font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none}
#bar button:disabled{background:#cbd5e1;cursor:default}
#bar button:active:not(:disabled){background:#1557b0}
#bar button.icon-only{padding:9px 12px}

/* 顶部全选 */
#topbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px;color:#555}
#topbar label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
#topbar input{width:18px;height:18px;accent-color:#1a73e8;margin:0}

@media(max-width:480px){
  .wrap{padding:10px 10px 96px}
  .title{font-size:14px}
  .meta{font-size:12px}
  #bar button{padding:9px 14px;font-size:13px}
}
</style>
</head><body>
<div class="wrap">
  <header>
    <h2>JSO 变化记录</h2>
    <p>更新：2026-04-10 17:31:10 ・ 共 2 条</p>
  </header>
  <div id="topbar">
    <label><input type="checkbox" id="allck"> 全选</label>
    <label><input type="checkbox" id="ckpri"> 仅选优先</label>
  </div>
  <div class="list"><label class="card"><div class="ck"><input type="checkbox" class="sel" data-vid="40375756325072" data-qty="10"></div><div class="body"><div class="title">『鬼滅の刃』Ａ全アートポスター</div><div class="meta"><span class="badge">商品补货</span>Default Title ・ 18041324 ・ 当前：有货</div><div class="foot"><span class="ts">2026-04-10 17:31:10</span><a class="link" href="https://jumpshop-online.com/products/18041324" target="_blank">18041324</a><a class="cart" href="https://jumpshop-online.com/cart/add?id=40375756325072&amp;quantity=10" target="_blank">🛒 单独加购 10</a></div></div></label><label class="card"><div class="ck"><input type="checkbox" class="sel" data-vid="40376017354960" data-qty="10"></div><div class="body"><div class="title">『ハイキュー!!』アクリルmini☆miniフィギュア　（全30種のうちランダム5個入）</div><div class="meta"><span class="badge">商品补货</span>Default Title ・ 18036924 ・ 当前：有货</div><div class="foot"><span class="ts">2026-04-10 17:31:10</span><a class="link" href="https://jumpshop-online.com/products/18036924" target="_blank">18036924</a><a class="cart" href="https://jumpshop-online.com/cart/add?id=40376017354960&amp;quantity=10" target="_blank">🛒 单独加购 10</a></div></div></label></div>
</div>
<div id="bar">
  <span id="cnt">已选 0</span>
  <div class="acts">
    <button id="btnCopy" disabled class="icon-only">📋</button>
    <button id="btnCart" disabled>🛒 批量加购</button>
  </div>
</div>
<script>
const BASE="https://jumpshop-online.com";
const boxes=document.querySelectorAll('.sel');
const cntEl=document.getElementById('cnt');
const btnCart=document.getElementById('btnCart');
const btnCopy=document.getElementById('btnCopy');
const allCk=document.getElementById('allck');
const ckPri=document.getElementById('ckpri');

function update(){
  const n=[...boxes].filter(b=>b.checked).length;
  cntEl.textContent='已选 '+n;
  btnCart.disabled=btnCopy.disabled=n===0;
  // 同步全选状态
  const enabled=[...boxes].filter(b=>!b.disabled);
  const filtered=ckPri.checked?enabled.filter(b=>b.closest('.card').classList.contains('pri')):enabled;
  if(filtered.length>0&&filtered.every(b=>b.checked)) allCk.checked=true;
  else allCk.checked=false;
}

// 点击卡片任意位置切换 checkbox（label 包裹已自动处理，但要阻止链接冒泡）
document.querySelectorAll('.card a').forEach(a=>{
  a.addEventListener('click',e=>e.stopPropagation());
});

allCk.addEventListener('change',function(){
  const v=this.checked;
  boxes.forEach(b=>{
    if(b.disabled) return;
    if(ckPri.checked){
      b.checked=v&&b.closest('.card').classList.contains('pri');
    }else{
      b.checked=v;
    }
  });
  update();
});

ckPri.addEventListener('change',function(){
  if(this.checked){
    boxes.forEach(b=>{
      if(!b.disabled&&!b.closest('.card').classList.contains('pri')) b.checked=false;
    });
  }
  update();
});

boxes.forEach(b=>b.addEventListener('change',update));

function buildUrl(){
  const items=[...boxes].filter(b=>b.checked);
  const params=items.map((b,i)=>
    'items['+i+'][id]='+b.dataset.vid+'&items['+i+'][quantity]='+b.dataset.qty
  ).join('&');
  return BASE+'/cart/add?'+params;
}

btnCart.addEventListener('click',function(){
  window.open(buildUrl(),'_blank');
});

btnCopy.addEventListener('click',function(){
  const url=buildUrl();
  const done=()=>{this.textContent='✅';setTimeout(()=>this.textContent='📋',1500)};
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(done.bind(this)).catch(()=>{
      const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done.call(this);
    });
  }else{
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done.call(this);
  }
});
</script>
</body></html>
